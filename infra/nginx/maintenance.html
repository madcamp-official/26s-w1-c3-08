<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>매아리 점검 중</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2937;
        --muted: #64748b;
        --line: #e5e7eb;
        --petal: #d9467d;
        --moss: #54796a;
        --paper: #fbf8fc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(92vw, 520px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(31, 41, 55, 0.08);
      }

      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 8px;
        background: var(--petal);
        color: #fff;
        font-weight: 800;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.35;
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .hint {
        margin-top: 22px;
        color: var(--moss);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">매</div>
      <h1>잠시 서버 점검 중입니다</h1>
      <p>
        매아리를 더 안정적으로 전해드리기 위해 짧은 점검을 진행하고 있어요.
        잠시 후 다시 접속해 주세요.
      </p>
      <p class="hint">이미 예약된 마음은 안전하게 보관됩니다.</p>
    </main>
  </body>
</html>
